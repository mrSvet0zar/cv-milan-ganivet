<!DOCTYPE html>
<html lang="fr" data-theme="dark" data-typo="mono">
<head>
<meta charset="UTF-8">
<title>CV — Notebook · Milan Ganivet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:ital,wght@0,400;0,600;1,400&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1014;
    --surface: #161a22;
    --surface-2: #1c2130;
    --line: #2a2f3d;
    --text: #e6e8ee;
    --text-dim: #9aa3b2;
    --text-faint: #5c6576;
    --accent: #f59e0b;   /* Jupyter-ish amber */
    --accent-2: #60a5fa; /* blue for in/out labels */
    --green: #4ade80;
    --pink: #f472b6;
    --violet: #a78bfa;
    --red: #f87171;
    --cell-in: #1a2233;
    --cell-out: transparent;
    --radius: 6px;
    --anim-duration: 0.5s;
  }
  :root[data-theme="light"] {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f4f4ef;
    --line: #e4e4dc;
    --text: #15151a;
    --text-dim: #5c6170;
    --text-faint: #9aa0ad;
    --cell-in: #f6f6f1;
    --accent: #d97706;
    --accent-2: #2563eb;
  }
  :root[data-typo="serif"] { --font-body: "Fraunces", Georgia, serif; --font-mono: "JetBrains Mono", ui-monospace, monospace; }
  :root[data-typo="sans"]  { --font-body: "Geist", system-ui, sans-serif; --font-mono: "JetBrains Mono", ui-monospace, monospace; }
  :root[data-typo="mono"]  { --font-body: "JetBrains Mono", ui-monospace, monospace; --font-mono: "JetBrains Mono", ui-monospace, monospace; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Top toolbar (jupyter-style) */
  .toolbar {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 14px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .file-name { color: var(--text-dim); }
  .file-name strong { color: var(--text); font-weight: 500; }
  .kernel { display: flex; align-items: center; gap: 6px; margin-left: auto; color: var(--text-dim); }
  .kernel-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .tbtn { background: transparent; color: var(--text-dim); border: 1px solid var(--line); padding: 5px 10px; border-radius: 4px; font: inherit; font-size: 11px; cursor: pointer; }
  .tbtn:hover { color: var(--text); border-color: var(--accent); }
  .tbtn.primary { background: var(--accent); color: #1a1004; border-color: var(--accent); }
  .tbtn.primary:hover { filter: brightness(1.08); }

  /* Notebook container */
  .notebook {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px 120px;
  }

  /* Cell */
  .cell {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 10px;
    margin-bottom: 14px;
    position: relative;
  }
  .cell-gutter {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
    padding-top: 10px;
    text-align: right;
    padding-right: 4px;
    user-select: none;
    white-space: nowrap;
  }
  .cell-gutter .lbl { color: var(--accent-2); }
  .cell-body {
    border: 1px solid transparent;
    border-left: 3px solid transparent;
    border-radius: var(--radius);
    padding: 0;
    background: transparent;
    transition: border-color 0.2s;
  }
  .cell[data-type="code"] .cell-body {
    background: var(--cell-in);
    border-color: var(--line);
    border-left-color: var(--accent-2);
  }
  .cell[data-type="code"]:hover .cell-body { border-left-color: var(--accent); }
  .cell[data-type="md"] .cell-body { padding: 4px 0; }
  .cell-body pre { margin: 0; padding: 14px 18px; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }

  /* Output cell */
  .cell-out {
    margin-top: -6px;
    margin-left: 74px;
    padding: 6px 0 18px;
    position: relative;
  }
  .cell-out-label {
    position: absolute; left: -64px; top: 6px;
    font-family: var(--font-mono); font-size: 11px; color: var(--pink);
    text-align: right; width: 56px;
  }

  /* Syntax highlighting (simple) */
  .tok-kw { color: var(--pink); }
  .tok-str { color: var(--green); }
  .tok-fn { color: var(--violet); }
  .tok-num { color: var(--accent); }
  .tok-com { color: var(--text-faint); font-style: italic; }
  .tok-op { color: var(--text-dim); }
  .tok-var { color: var(--accent-2); }

  /* Markdown cell typography */
  .cell-md h1 { font-family: var(--font-body); font-size: 40px; font-weight: 700; margin: 8px 0 4px; letter-spacing: -0.02em; line-height: 1.1; }
  [data-typo="serif"] .cell-md h1 { font-weight: 600; font-style: italic; letter-spacing: -0.01em; }
  .cell-md h2 { font-family: var(--font-body); font-size: 22px; font-weight: 600; margin: 24px 0 8px; color: var(--text); letter-spacing: -0.01em; }
  .cell-md h2::before { content: "##"; color: var(--accent); margin-right: 10px; font-family: var(--font-mono); opacity: 0.5; }
  .cell-md p { color: var(--text-dim); margin: 6px 0; max-width: 70ch; }
  .cell-md .subtitle { color: var(--text); font-size: 16px; }
  .cell-md .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .badge { font-family: var(--font-mono); font-size: 11px; padding: 4px 9px; border-radius: 4px; background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--line); }
  .badge.avail { color: var(--green); border-color: color-mix(in oklab, var(--green) 40%, var(--line)); }
  .badge.loc::before { content: "📍 "; }

  /* Output widgets */
  .widget {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-family: var(--font-mono);
    font-size: 12.5px;
  }
  .widget-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); margin-bottom: 10px; }

  /* DataFrame-style experience table */
  .df {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .df th, .df td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
  .df thead { background: var(--surface-2); }
  .df th { font-weight: 600; color: var(--text-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; }
  .df tbody tr { transition: background 0.15s; }
  .df tbody tr:hover { background: color-mix(in oklab, var(--accent) 8%, transparent); }
  .df .idx { color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .df .role { color: var(--text); font-weight: 500; }
  .df .company { color: var(--accent); }
  .df .period { color: var(--text-dim); white-space: nowrap; font-variant-numeric: tabular-nums; }
  /* Expandable detail row — hide the whole row by default, show as a normal table-row when expanded.
     Inner <td colspan> spans the full width of the parent table; we use a flex/grid wrapper inside it
     so bullets stack vertically and chips wrap horizontally across the full page width. */
  tr.exp-row.detail { display: none; }
  tr.exp-row.detail.expanded { display: table-row; }
  .exp-detail { padding: 16px 20px !important; background: var(--cell-in); border-top: 1px dashed var(--line); }
  .exp-detail-inner { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .exp-detail ul { margin: 0; padding-left: 20px; color: var(--text-dim); display: flex; flex-direction: column; gap: 6px; list-style: "→  "; }
  .exp-detail ul li { line-height: 1.5; padding-left: 4px; }
  .exp-detail .chips { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; }
  .chip { font-size: 10.5px; padding: 3px 7px; border-radius: 3px; background: var(--surface-2); color: var(--text); border: 1px solid var(--line); }
  .expand-hint { color: var(--text-faint); font-size: 10px; cursor: pointer; user-select: none; }

  /* Project cards = subplots */
  .subplots-title { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin-bottom: 10px; }
  .subplots { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .subplot { border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; background: var(--surface); position: relative; overflow: hidden; transition: transform 0.25s, border-color 0.2s; }
  .subplot:hover { border-color: var(--accent); transform: translateY(-2px); }
  .subplot-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .subplot-name { font-family: var(--font-mono); font-weight: 600; color: var(--accent); font-size: 13px; }
  .subplot-stars { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
  .subplot-star { color: var(--accent); }
  .subplot-tag { color: var(--text-dim); font-size: 12px; margin-bottom: 10px; }
  .subplot-desc { color: var(--text-dim); font-size: 12px; line-height: 1.55; margin-bottom: 12px; }
  .subplot-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .subplot-impact { font-family: var(--font-mono); font-size: 10.5px; color: var(--violet); }
  .subplot-impact::before { content: "// "; opacity: 0.5; }

  /* Skill bars */
  .skills-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 28px; }
  .skill-group h4 { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); margin: 0 0 10px; }
  .skill { display: grid; grid-template-columns: 130px 1fr 46px; align-items: center; gap: 10px; margin-bottom: 8px; font-family: var(--font-mono); font-size: 12px; }
  .skill-name { color: var(--text); }
  .skill-bar { height: 8px; background: var(--surface-2); border-radius: 2px; overflow: hidden; position: relative; border: 1px solid var(--line); }
  .skill-fill { height: 100%; background: linear-gradient(90deg, var(--accent-2), var(--accent)); width: 0; transition: width 1.2s cubic-bezier(0.2, 0.7, 0.2, 1); }
  .skill-pct { color: var(--text-faint); font-variant-numeric: tabular-nums; text-align: right; font-size: 11px; }

  /* Plot chart (matplotlib-style) */
  .plot { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
  .plot-title { font-family: var(--font-body); font-size: 13px; color: var(--text); margin-bottom: 10px; text-align: center; }
  .plot-svg { width: 100%; height: 220px; display: block; }
  .plot-axis line { stroke: var(--line); }
  .plot-axis text { fill: var(--text-faint); font-family: var(--font-mono); font-size: 10px; }
  .plot-bar { fill: var(--accent-2); transition: fill 0.2s; }
  .plot-bar:hover { fill: var(--accent); }
  .plot-label { fill: var(--text); font-family: var(--font-mono); font-size: 10px; }

  /* ============================ Floating chatbot ============================ */
  .ai-fab {
    position: fixed; bottom: 16px; right: 84px; z-index: 9998;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 14px 10px 12px;
    background: linear-gradient(135deg, color-mix(in oklab, var(--violet) 28%, var(--surface)), var(--surface));
    color: var(--text);
    border: 1px solid color-mix(in oklab, var(--violet) 50%, var(--line));
    border-radius: 999px;
    font-family: var(--font-mono); font-size: 12px;
    cursor: pointer;
    box-shadow: 0 6px 24px -8px color-mix(in oklab, var(--violet) 60%, transparent), 0 1px 0 rgba(255,255,255,0.04) inset;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .ai-fab:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -8px color-mix(in oklab, var(--violet) 75%, transparent); }
  .ai-fab .orb {
    width: 18px; height: 18px; border-radius: 50%;
    background: conic-gradient(from 0deg, var(--violet), var(--accent-2), var(--pink), var(--accent), var(--violet));
    animation: spin calc(6s / max(var(--anim-intensity), 0.15)) linear infinite;
    box-shadow: 0 0 12px color-mix(in oklab, var(--violet) 70%, transparent);
  }
  .ai-fab .lbl { font-weight: 600; letter-spacing: 0.02em; }
  .ai-fab .badge { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.6s ease-in-out infinite; margin-left: 2px; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  .ai-bot {
    position: fixed; bottom: 16px; right: 16px; z-index: 9998;
    width: min(380px, calc(100vw - 32px));
    height: min(560px, calc(100vh - 110px));
    background: var(--surface);
    border: 1px solid color-mix(in oklab, var(--violet) 35%, var(--line));
    border-radius: 14px;
    box-shadow: 0 24px 60px -16px rgba(0,0,0,0.6), 0 0 0 1px color-mix(in oklab, var(--violet) 14%, transparent);
    display: none; flex-direction: column;
    overflow: hidden;
    transform-origin: bottom right;
    animation: botOpen 0.28s cubic-bezier(0.2, 0.7, 0.2, 1.05);
    font-family: var(--font-mono);
  }
  .ai-bot.open { display: flex; }
  @keyframes botOpen { from { opacity: 0; transform: translateY(8px) scale(0.96); } to { opacity: 1; transform: none; } }

  .ai-bot-head {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    background: linear-gradient(135deg, color-mix(in oklab, var(--violet) 18%, var(--surface)), var(--surface));
    border-bottom: 1px solid var(--line);
  }
  .ai-bot-head .orb { width: 22px; height: 22px; border-radius: 50%; background: conic-gradient(from 0deg, var(--violet), var(--accent-2), var(--pink), var(--accent), var(--violet)); animation: spin calc(6s / max(var(--anim-intensity), 0.15)) linear infinite; }
  .ai-bot-head .meta { display: flex; flex-direction: column; line-height: 1.15; }
  .ai-bot-head .meta strong { font-size: 12.5px; color: var(--text); font-weight: 600; }
  .ai-bot-head .meta small { font-size: 10px; color: var(--text-faint); display: inline-flex; align-items: center; gap: 5px; margin-top: 1px; }
  .ai-bot-head .meta small::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  .ai-bot-head button { margin-left: auto; background: transparent; color: var(--text-dim); border: 0; font: inherit; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
  .ai-bot-head button:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  [data-theme="light"] .ai-bot-head button:hover { background: rgba(0,0,0,0.05); }

  .ai-bot-msgs {
    flex: 1; overflow-y: auto;
    padding: 14px 14px 8px;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: var(--line) transparent;
    background:
      linear-gradient(var(--surface), var(--surface)) padding-box,
      repeating-linear-gradient(0deg, transparent 0 22px, color-mix(in oklab, var(--violet) 4%, transparent) 22px 23px) padding-box;
  }
  .ai-bot-msgs::-webkit-scrollbar { width: 6px; }
  .ai-bot-msgs::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  .msg { display: flex; flex-direction: column; max-width: 90%; animation: msgIn 0.3s cubic-bezier(0.2,0.7,0.2,1); }
  @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .msg .role { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-faint); margin-bottom: 3px; padding: 0 2px; }
  .msg .bubble { padding: 9px 12px; border-radius: 10px; font-size: 12.5px; line-height: 1.55; white-space: pre-wrap; }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.user .role { color: var(--accent); }
  .msg.user .bubble {
    background: var(--bg);
    border: 1px solid var(--line);
    border-bottom-right-radius: 3px;
    font-family: var(--font-mono);
    color: var(--text);
  }
  .msg.user .bubble::before { content: ">>> "; color: var(--accent); }

  .msg.bot { align-self: flex-start; }
  .msg.bot .role { color: var(--violet); }
  .msg.bot .bubble {
    background: linear-gradient(135deg, color-mix(in oklab, var(--violet) 14%, var(--bg)), var(--bg));
    border: 1px solid color-mix(in oklab, var(--violet) 30%, var(--line));
    border-left: 2px solid var(--violet);
    border-bottom-left-radius: 3px;
    font-family: var(--font-body);
    color: var(--text);
  }

  .ai-bot-welcome {
    text-align: center; padding: 18px 12px 8px;
    color: var(--text-dim); font-family: var(--font-mono); font-size: 11.5px;
  }
  .ai-bot-welcome strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 4px; font-family: var(--font-body); font-weight: 600; }
  .ai-bot-welcome em { color: var(--text-faint); font-style: normal; }

  .ai-bot-examples { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 14px 10px; }
  .ai-bot-examples button {
    background: var(--surface-2); border: 1px solid var(--line); color: var(--text-dim);
    padding: 4px 9px; border-radius: 999px;
    font: inherit; font-family: var(--font-mono); font-size: 10.5px; cursor: pointer;
  }
  .ai-bot-examples button:hover { border-color: var(--violet); color: var(--text); }

  .ai-bot-input {
    display: flex; gap: 6px; padding: 10px 12px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }
  .ai-bot-input input {
    flex: 1; background: var(--surface); border: 1px solid var(--line); color: var(--text);
    padding: 9px 12px; border-radius: 8px;
    font: inherit; font-family: var(--font-mono); font-size: 12.5px; outline: none;
  }
  .ai-bot-input input:focus { border-color: var(--violet); box-shadow: 0 0 0 3px color-mix(in oklab, var(--violet) 18%, transparent); }
  .ai-bot-input button {
    background: var(--violet); color: #1a1004; border: 0;
    padding: 0 14px; border-radius: 8px;
    font: inherit; font-family: var(--font-mono); font-size: 13px; font-weight: 700; cursor: pointer;
    min-width: 38px;
  }
  .ai-bot-input button:hover { filter: brightness(1.1); }
  .ai-bot-input button:disabled { opacity: 0.5; cursor: wait; }

  .ai-thinking { display: inline-flex; gap: 3px; align-items: center; }
  .ai-thinking span { width: 5px; height: 5px; border-radius: 50%; background: var(--violet); animation: bounce 1s ease-in-out infinite; }
  .ai-thinking span:nth-child(2) { animation-delay: 0.15s; }
  .ai-thinking span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 520px) {
    .ai-fab { right: 16px; bottom: 70px; }
    .ai-bot { right: 8px; left: 8px; width: auto; bottom: 8px; height: 70vh; }
  }

  /* Caret + running indicator */
  .blink { display: inline-block; width: 7px; height: 14px; background: var(--accent); vertical-align: text-top; margin-left: 2px; animation: blink calc(1s / max(var(--anim-intensity), 0.2)) steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* variation switcher */
  .var-nav { position: fixed; top: 14px; left: 14px; z-index: 30; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 4px; display: flex; gap: 2px; font-family: var(--font-mono); font-size: 11px; }
  .var-nav a { padding: 5px 10px; border-radius: 999px; color: var(--text-dim); text-decoration: none; }
  .var-nav a.on { background: var(--accent); color: #1a1004; font-weight: 600; }

  /* reduce animation intensity helper */
  body[data-anim-low="true"] * { animation-duration: 6s !important; }

  @media (max-width: 720px) {
    .subplots, .skills-grid { grid-template-columns: 1fr; }
    .cell-gutter { display: none; }
    .cell { grid-template-columns: 1fr; }
    .cell-out { margin-left: 0; }
    .cell-out-label { position: static; width: auto; margin-bottom: 6px; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="logo"><span class="logo-dot"></span> jupyter</div>
  <div class="file-name"><strong>milan_ganivet_cv.ipynb</strong> <span id="lastSaved">· last saved 2 min ago</span></div>
  <div class="kernel"><span class="kernel-dot"></span> Python 3.12 · ready</div>
  <button class="tbtn primary" id="runAllBtn">▶ Run All</button>
  <button class="tbtn" onclick="window.print()">⇣ PDF</button>
</div>

<main class="notebook" id="nb"></main>

<!-- Floating AI chatbot -->
<button class="ai-fab" id="aiFab" aria-label="Open AI chat" title="Demandez à l'IA">
  <span class="orb"></span>
  <span class="lbl" id="aiFabLbl">Demandez à l'IA</span>
  <span class="badge"></span>
</button>

<aside class="ai-bot" id="aiBot" role="dialog" aria-label="AI assistant">
  <header class="ai-bot-head">
    <span class="orb"></span>
    <div class="meta">
      <strong id="aiBotTitle">Assistant CV</strong>
      <small id="aiBotSub">claude-haiku · ctx: cv.json</small>
    </div>
    <button id="aiBotClose" aria-label="Close">✕</button>
  </header>
  <div class="ai-bot-msgs" id="aiBotMsgs">
    <div class="ai-bot-welcome" id="aiBotWelcome">
      <strong id="aiBotWelTitle">👋 Bonjour !</strong>
      <em id="aiBotWelSub">Je connais tout le parcours de Milan. Posez-moi vos questions.</em>
    </div>
  </div>
  <div class="ai-bot-examples" id="aiBotExamples"></div>
  <form class="ai-bot-input" id="aiBotForm" autocomplete="off">
    <input id="aiBotInput" type="text" placeholder="..." />
    <button type="submit" id="aiBotSend" aria-label="Send">↵</button>
  </form>
</aside>

<script src="shared/content.js"></script>
<script src="shared/tweaks.js"></script>
<script src="shared/ai-assistant.js"></script>
<script>
/* Simple Python-ish syntax highlighter for the code cells. */
function hl(code) {
  const kw = /\b(import|from|def|class|return|if|else|elif|for|in|as|with|lambda|self|None|True|False|pd|np|print)\b/g;
  return code
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/(#[^\n]*)/g, '<span class="tok-com">$1</span>')
    .replace(/(".*?"|'.*?')/g, '<span class="tok-str">$1</span>')
    .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="tok-num">$1</span>')
    .replace(kw, '<span class="tok-kw">$1</span>')
    .replace(/\b([a-z_][a-z0-9_]*)\(/gi, '<span class="tok-fn">$1</span>(');
}

let cellCount = 0;
function cellIdx() { return ++cellCount; }

function mdCell(html) {
  return `<div class="cell" data-type="md">
    <div class="cell-gutter"></div>
    <div class="cell-body cell-md">${html}</div>
  </div>`;
}
function codeCell(code, outHtml) {
  const i = cellIdx();
  return `<div class="cell" data-type="code">
    <div class="cell-gutter"><span class="lbl">In</span> [<span>${i}</span>]:</div>
    <div class="cell-body"><pre>${hl(code)}</pre></div>
  </div>
  <div class="cell-out"><div class="cell-out-label">Out[${i}]:</div>${outHtml}</div>`;
}

function renderNotebook() {
  const lang = window.Tweaks.get().lang;
  const c = window.CV_CONTENT[lang];
  const L = c.labels;
  const nb = document.getElementById('nb');
  cellCount = 0;

  // --- Header markdown cell
  let html = mdCell(`
    <h1>${c.meta.name}<span class="blink"></span></h1>
    <p class="subtitle"><em>${c.meta.title}</em> — ${c.meta.tagline}</p>
    <div class="badges">
      <span class="badge loc">${c.meta.location}</span>
      <span class="badge">${c.meta.years} ${L.years}</span>
      <span class="badge avail" style="color: rgb(222, 74, 74)">● ${L.available}</span>
      <span class="badge"><a href="mailto:${c.meta.email}" style="color:inherit;text-decoration:none;">${c.meta.email}</a></span>
    </div>
  `);

  // --- Import cell
  html += codeCell(
`# ${lang === 'fr' ? 'Importons les dépendances' : 'Import dependencies'}
import pandas as pd
import numpy as np
from cv import experience, projects, skills`,
    `<div class="widget" style="color:var(--text-faint); font-family:var(--font-mono); font-size:12px;">
      <span style="color:var(--green);">✓</span> 3 modules loaded · kernel idle
    </div>`
  );

  // --- About / heading 2
  html += mdCell(`<h2>${L.about}</h2>${c.about.map(p => `<p>${p}</p>`).join('')}`);

  // AI assistant: floating chatbot (see #aiBot) — the old inline cell was moved
  // there so it doesn't break the notebook reading rhythm.

  // --- Experience heading + DataFrame
  html += mdCell(`<h2>${L.experience}</h2><p>${lang === 'fr' ? 'Historique des postes comme un DataFrame pandas — cliquez une ligne pour déplier.' : 'Position history as a pandas DataFrame — click a row to expand.'}</p>`);
  let tableRows = '';
  c.experiences.forEach((e, i) => {
    tableRows += `
      <tr class="exp-row" data-exp="${i}">
        <td class="idx">${i}</td>
        <td class="role">${e.role}</td>
        <td class="company">${e.company}</td>
        <td class="period">${e.period}</td>
        <td class="expand-hint">+ expand</td>
      </tr>
      <tr class="exp-row detail" data-exp="${i}">
        <td colspan="5" class="exp-detail">
          <div class="exp-detail-inner">
            <ul>${e.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
            <div class="chips">${e.stack.map(s => `<span class="chip">${s}</span>`).join('')}</div>
          </div>
        </td>
      </tr>`;
  });
  html += codeCell(
`experience.head(${c.experiences.length})`,
    `<div class="widget" style="padding:0;overflow:hidden;">
      <table class="df">
        <thead><tr><th>#</th><th>role</th><th>company</th><th>period</th><th></th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`
  );

  // --- Projects heading + subplots
  html += mdCell(`<h2>${L.projects}</h2><p>${lang === 'fr' ? 'Open source & side-projects — rendus comme des subplots.' : 'Open-source & side-projects — rendered as subplots.'}</p>`);
  html += codeCell(
`fig, ax = plt.subplots(2, 2, figsize=(10, 6))
projects.render(ax)`,
    `<div class="widget">
      <div class="subplots-title">fig, axes = 2×2 subplots · ${c.projects.length} items</div>
      <div class="subplots">
        ${c.projects.map(p => `
          <div class="subplot">
            <div class="subplot-head">
              <div class="subplot-name">${p.name}</div>
              <div class="subplot-stars"><span class="subplot-star">★</span> ${p.stars}</div>
            </div>
            <div class="subplot-tag">${p.tagline}</div>
            <div class="subplot-desc">${p.description}</div>
            <div class="subplot-chips">${p.stack.map(s => `<span class="chip">${s}</span>`).join('')}</div>
            <div class="subplot-impact">${p.impact}</div>
          </div>
        `).join('')}
      </div>
    </div>`
  );

  // --- Skills heading + bar chart
  html += mdCell(`<h2>${L.skills}</h2><p>${lang === 'fr' ? 'Niveau par compétence, normalisé ∈ [0, 1].' : 'Proficiency per skill, normalized ∈ [0, 1].'}</p>`);
  const groups = Object.entries(c.skills);
  const skillsHtml = groups.map(([g, arr]) => `
    <div class="skill-group">
      <h4>${g}</h4>
      ${arr.map((s, idx) => `
        <div class="skill">
          <div class="skill-name">${s.name}</div>
          <div class="skill-bar"><div class="skill-fill" data-level="${s.level}" style="transition-delay:${idx * 60}ms"></div></div>
          <div class="skill-pct">${Math.round(s.level * 100)}%</div>
        </div>
      `).join('')}
    </div>
  `).join('');
  html += codeCell(
`skills.plot(kind="barh", cmap="viridis")
plt.show()`,
    `<div class="widget"><div class="skills-grid">${skillsHtml}</div></div>`
  );

  // --- Contact cell
  html += mdCell(`<h2>${L.contact}</h2>
    <p>${lang === 'fr' ? 'Le moyen le plus rapide de me joindre :' : 'Fastest way to reach me:'}</p>
    <div class="badges">
      <span class="badge"><a href="mailto:${c.meta.email}" style="color:inherit;text-decoration:none;">✉ ${c.meta.email}</a></span>
      <span class="badge"><a href="https://github.com/mrSvet0zar" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">⌬ github.com/mrSvet0zar</a></span>
      <span class="badge"><a href="https://linkedin.com/in/milan-ganivet" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">⎘ linkedin.com/in/milan-ganivet</a></span>
    </div>
  `);

  nb.innerHTML = html;

  // Animate skill bars
  setTimeout(() => {
    document.querySelectorAll('.skill-fill').forEach(el => {
      el.style.width = (parseFloat(el.dataset.level) * 100) + '%';
    });
  }, 60);

  // Expand experience rows
  document.querySelectorAll('.exp-row').forEach(row => {
    row.addEventListener('click', () => {
      const i = row.dataset.exp;
      document.querySelectorAll(`.exp-row[data-exp="${i}"]`).forEach(r => r.classList.toggle('expanded'));
    });
  });

  // AI hookup — floating chatbot
  setupChatbot(L, lang);
}

/* ============================ Floating chatbot ============================ */
let chatHistory = [];
function setupChatbot(L, lang) {
  const fab = document.getElementById('aiFab');
  const bot = document.getElementById('aiBot');
  const close = document.getElementById('aiBotClose');
  const form = document.getElementById('aiBotForm');
  const input = document.getElementById('aiBotInput');
  const send = document.getElementById('aiBotSend');
  const msgs = document.getElementById('aiBotMsgs');
  const examples = document.getElementById('aiBotExamples');

  // Update labels for current lang
  document.getElementById('aiFabLbl').textContent = L.askAi;
  document.getElementById('aiBotTitle').textContent = lang === 'fr' ? 'Assistant CV' : 'CV Assistant';
  document.getElementById('aiBotSub').textContent = (lang === 'fr' ? 'en ligne' : 'online') + ' · claude-haiku · ctx: cv.json';
  document.getElementById('aiBotWelTitle').textContent = lang === 'fr' ? '👋 Bonjour !' : '👋 Hi there!';
  document.getElementById('aiBotWelSub').textContent = lang === 'fr'
    ? "Je connais tout le parcours d'Alex. Posez-moi vos questions."
    : "I know Alex's full background. Ask me anything.";
  input.placeholder = L.askPlaceholder;
  send.title = lang === 'fr' ? 'Envoyer' : 'Send';

  // Examples
  examples.innerHTML = L.exampleQuestions.map(q => `<button type="button">${q}</button>`).join('');
  examples.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { input.value = b.textContent; form.requestSubmit(); });
  });

  // Open / close
  function open() { bot.classList.add('open'); fab.style.display = 'none'; setTimeout(() => input.focus(), 200); }
  function closeBot() { bot.classList.remove('open'); fab.style.display = ''; }
  fab.onclick = open;
  close.onclick = closeBot;
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && bot.classList.contains('open')) closeBot(); });

  // Restore history (keeps thread on language change)
  msgs.querySelectorAll('.msg').forEach(m => m.remove());
  if (chatHistory.length === 0) {
    document.getElementById('aiBotWelcome').style.display = '';
    examples.style.display = '';
  } else {
    document.getElementById('aiBotWelcome').style.display = 'none';
    chatHistory.forEach(m => appendMsg(m.role, m.text));
  }

  function appendMsg(role, text) {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.innerHTML = `<div class="role">${role === 'user' ? (lang === 'fr' ? 'Vous' : 'You') : 'Claude'}</div><div class="bubble"></div>`;
    el.querySelector('.bubble').textContent = text;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  form.onsubmit = async (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (!q || send.disabled) return;
    document.getElementById('aiBotWelcome').style.display = 'none';
    examples.style.display = 'none';
    input.value = '';
    appendMsg('user', q);
    chatHistory.push({ role: 'user', text: q });

    const botEl = appendMsg('bot', '');
    const bubble = botEl.querySelector('.bubble');
    bubble.innerHTML = `<span class="ai-thinking"><span></span><span></span><span></span></span> ${L.thinking}`;
    send.disabled = true;
    try {
      const res = await window.CvAI.ask(q);
      bubble.textContent = res;
      chatHistory.push({ role: 'bot', text: res });
    } catch (err) {
      bubble.textContent = lang === 'fr' ? 'Erreur — réessayez.' : 'Error — try again.';
    }
    send.disabled = false;
    input.focus();
  };
}

// Set html lang + initial render, re-render on tweak changes.
function applyLang() {
  const l = window.Tweaks.get().lang;
  document.documentElement.lang = l;
}
renderNotebook(); applyLang();
window.Tweaks.onChange((s) => { renderNotebook(); applyLang(); });

// Run All — animate kernel dot + cells briefly
document.getElementById('runAllBtn').addEventListener('click', () => {
  const cells = document.querySelectorAll('.cell[data-type="code"]');
  cells.forEach((c, i) => {
    setTimeout(() => {
      c.style.borderLeftColor = 'var(--green)';
      const gutter = c.querySelector('.cell-gutter span');
      if (gutter) { const prev = gutter.textContent; gutter.textContent = '*'; setTimeout(() => gutter.textContent = prev, 400); }
    }, i * 180);
  });
});
</script>
</body>
</html>
